id: io.github.tobagin.Ntfyr
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: ntfyr
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.secrets
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - '*.la'
  - '*.a'
modules:
  - name: capnproto
    buildsystem: autotools
    sources:
      - type: archive
        url: https://capnproto.org/capnproto-c++-1.4.0.tar.gz
        sha256: fa02378ad522b318916b9ad928d1372fc9abd43dd1f4f0392e50450f5c87828f
  - name: ntfyr
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/tobagin/Notify
        tag: v0.5.0
        commit: bbd8e040d8ab3d919ecc296f96f32ddcfbcbf15b
      - cargo-sources.json
